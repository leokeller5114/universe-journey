<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Journey</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
transition: background 1s;
background: radial-gradient(circle at 20% 20%, #4a00e0, transparent 40%),
            radial-gradient(circle at 80% 80%, #8e2de2, transparent 40%),
            black;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation: moveStars 60s linear infinite;
opacity:0.2;
}

@keyframes moveStars{
from{transform:translate(0,0);}
to{transform:translate(-500px,-500px);}
}

#card{
width:420px;
padding:25px;
border-radius:25px;
background:rgba(0,0,30,0.8);
backdrop-filter:blur(20px);
text-align:center;
box-shadow:0 0 40px rgba(138,43,226,0.5);
}

button{
width:100%;
padding:18px;
margin:8px 0;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{transform:scale(1.05);}
.hidden{display:none;}

#dimensionShop{
background:rgba(10,0,30,0.9);
box-shadow:0 0 60px rgba(0,255,255,0.5);
}

#dimensionBtn{
background:linear-gradient(135deg,#00c6ff,#0072ff);
box-shadow:0 0 20px #00eaff;
}

#dmAmount{
font-size:20px;
color:#00eaff;
}

</style>
</head>

<body>

<div id="card">

<div id="main">
<h1>🌌 Universe Journey</h1>
<p id="coins">💰 0</p>
<p id="darkMatter" class="hidden">💠 0</p>
<p id="world">🌍 Erde</p>

<button onclick="clickCoin()">✨ Energie sammeln</button>
<button onclick="buyWorld()">🚀 Nächste Welt</button>

<button onclick="openShop()">🏪 Shop</button>
<button onclick="openPrestigeShop()">💎 Prestige Shop</button>

<button id="prestigeBtn" onclick="prestige()"></button>
<button id="dimensionBtn" onclick="openDimensionShop()" class="hidden">
🧬 Dimension

</button>
<button id="voidBtn" onclick="openVoidShop()" class="hidden">
🌌 Void
</button>
</div>

<div id="shop" class="hidden">
<h2>🏪 Shop</h2>

<button id="auto1Btn" onclick="buyAuto1()"></button>
<button id="auto2Btn" onclick="buyAuto2()"></button>
<button id="auto3Btn" onclick="buyAuto3()"></button>

<button id="boost1Btn" onclick="buyBoost1()"></button>
<button id="boost2Btn" onclick="buyBoost2()"></button>
<button id="boost3Btn" onclick="buyBoost3()"></button>

<button onclick="closeShop()">⬅️ Zurück</button>
</div>

<div id="prestigeShop" class="hidden">
<h2>💎 Prestige Shop</h2>

<button onclick="buySkin('fire')">🔥 Fire Skin (5💎)</button>
<button onclick="buySkin('ice')">❄️ Ice Skin (5💎)</button>
<button onclick="buySkin('neon')">💜 Neon Skin (10💎)</button>

<button onclick="closePrestigeShop()">⬅️ Zurück</button>


</div>
<div id="dimensionShop" class="hidden">

<h2>🧬 Dimension</h2>

<p id="dmAmount">💠 0</p>

<button id="dmBoostBtn" onclick="buyDMBoost()"></button>

<button onclick="closeDimensionShop()">⬅️ Zurück</button>

</div>
<div id="voidShop" class="hidden">

<h2>🌌 Void Dimension</h2>

<p id="voidAmount">🌌 0</p>

<button id="voidBoostBtn" onclick="buyVoidBoost()"></button>

<button onclick="closeVoidShop()">⬅️ Zurück</button>

</div>
</div>

<script>
const main = document.getElementById("main");
const shop = document.getElementById("shop");
const prestigeShop = document.getElementById("prestigeShop");
const dimensionShop = document.getElementById("dimensionShop");

// 🌍 WELTEN (gekürzt nicht verändert)
const worlds = [

/* 🌍 START */
{name:"🌍 Erde",cost:0,power:1},
{name:"🌙 Mond",cost:50,power:2},
{name:"🔴 Mars",cost:200,power:4},
{name:"🟡 Venus",cost:500,power:8},
{name:"☀️ Sonne",cost:1500,power:15},
{name:"🪐 Jupiter",cost:4000,power:30},
{name:"💫 Saturn",cost:10000,power:60},
{name:"🌊 Neptun",cost:25000,power:120},

/* 🌌 GALAXIE */
{name:"🌌 Milchstraße",cost:60000,power:250},
{name:"🌠 Andromeda",cost:150000,power:500},
{name:"🌌 Triangulum",cost:300000,power:900},
{name:"🌌 Zwerggalaxie",cost:600000,power:1500},
{name:"🌌 Spiralgalaxie",cost:1200000,power:2500},
{name:"🌌 Elliptische Galaxie",cost:2500000,power:4000},

/* ⭐ STERNE */
{name:"⭐ Roter Zwerg",cost:5000000,power:7000},
{name:"⭐ Weißer Zwerg",cost:10000000,power:12000},
{name:"⭐ Neutronenstern",cost:20000000,power:20000},
{name:"🔥 Supernova",cost:40000000,power:35000},
{name:"🌀 Pulsar",cost:80000000,power:60000},

/* 🕳️ EXTREM */
{name:"🕳️ Schwarzes Loch",cost:150000000,power:100000},
{name:"🕳️ Supermassiv",cost:300000000,power:180000},
{name:"🌀 Wurmloch",cost:600000000,power:300000},
{name:"⚡ Raum-Zeit-Riss",cost:1200000000,power:500000},
{name:"🌌 Dunkle Materie",cost:2500000000,power:900000},

/* 💥 UNIVERSUM */
{name:"💥 Urknall",cost:5000000000,power:1500000},
{name:"🌌 Multiversum",cost:10000000000,power:3000000},
{name:"♾️ Unendlichkeit",cost:20000000000,power:6000000},

/* 🧬 DIMENSIONEN */
{name:"🌈 Dimensionsbruch",cost:40000000000,power:12000000},
{name:"🧬 Parallelwelt",cost:80000000000,power:25000000},
{name:"🧠 Bewusstsein",cost:150000000000,power:50000000},
{name:"👁️ Kosmisches Auge",cost:300000000000,power:100000000},
{name:"⚛️ Urenergie",cost:600000000000,power:200000000},

/* 🌀 ENDGAME */
{name:"🌌 Zeitlosigkeit",cost:1200000000000,power:400000000},
{name:"🌀 Endlosraum",cost:2500000000000,power:800000000},
{name:"💎 Realität",cost:5000000000000,power:1500000000},
{name:"🧿 Göttliche Ebene",cost:10000000000000,power:3000000000},
{name:"👑 Schöpfer",cost:20000000000000,power:6000000000},

/* 🚀 GOD TIER */
{name:"⚡ Gottmodus",cost:40000000000000,power:12000000000},
{name:"🔥 Allmacht",cost:80000000000000,power:25000000000},
{name:"🌌 Kosmischer Gott",cost:150000000000000,power:50000000000},
{name:"💠 Absolute Realität",cost:300000000000000,power:100000000000},
{name:"👑 Schöpfer aller Dinge",cost:600000000000000,power:200000000000},

/* 🧠 INSANE */
{name:"🧬 Universelles Bewusstsein",cost:1200000000000000,power:400000000000},
{name:"🌌 Realität selbst",cost:2500000000000000,power:800000000000},
{name:"⚛️ Existenzkern",cost:5000000000000000,power:1500000000000},
{name:"🌀 Ursprung der Zeit",cost:10000000000000000,power:3000000000000},
{name:"💥 Anfang & Ende",cost:20000000000000000,power:6000000000000}

];
let s = {
coins:0,
level:0,
prestige:0,

auto1:0,
auto2:0,
auto3:0,

boost1:0,
boost2:0,
boost3:0,

skin:"default",

dimension:false,
darkMatter:0,
dmBoost:0,

// 🧬 NEU
dimension2:false,
voidEnergy:0,
voidBoost:0
};
// SAVE / LOAD
function save(){
localStorage.setItem("gameSave", JSON.stringify(s));
}

function load(){
let data = localStorage.getItem("gameSave");
if(data) s = JSON.parse(data);
}

function update(){

// 💰 Anzeige
coins.innerText = "💰 " + Math.floor(s.coins) + " | 💎 " + s.prestige;

// 🌍 Welt
world.innerText = worlds[s.level].name;

if(s.dimension){
    world.innerText += " 🧬 Dimension";
}

// 🚀 Nächste Welt
let next = worlds[s.level+1];

document.querySelector("#main button:nth-of-type(2)").innerText =
next ? "🚀 " + next.name + " (" + next.cost + ")" : "🏆 Max erreicht!";


// 🤖 Autos
auto1Btn.innerText =
"🤖 +1/s\nKosten: " + Math.floor(50 * Math.pow(1.5, s.auto1));

auto2Btn.innerText =
"🚀 +5/s\nKosten: " + Math.floor(200 * Math.pow(1.6, s.auto2));

auto3Btn.innerText =
"🌌 +20/s\nKosten: " + Math.floor(1000 * Math.pow(1.7, s.auto3));


// 💥 Boosts
boost1Btn.innerText =
"💥 Klick x" + (1 + s.boost1) +
"\nKosten: " + Math.floor(200 * Math.pow(1.8, s.boost1));

boost2Btn.innerText =
"⚡ Auto x" + (1 + s.boost2) +
"\nKosten: " + Math.floor(500 * Math.pow(1.9, s.boost2));

boost3Btn.innerText =
"🚀 Mega x" + (1 + s.boost3) +
"\nKosten: " + Math.floor(2000 * Math.pow(2.0, s.boost3));


let pCost = getPrestigeCost();

prestigeBtn.innerText =
"💎 Prestige\nKosten: " + pCost;


// 🧬 Dimension UI
if(s.dimension){

    darkMatter.classList.remove("hidden");
    dimensionBtn.classList.remove("hidden");

    darkMatter.innerText = "💠 " + Math.floor(s.darkMatter);
    dmAmount.innerText = "💠 " + Math.floor(s.darkMatter);

    let cost = Math.floor(10 * Math.pow(2, s.dmBoost));

    dmBoostBtn.innerText =
    "💠 DM Boost x" + (1 + s.dmBoost) +
    "\nKosten: " + cost;

}else{

    darkMatter.classList.add("hidden");
    dimensionBtn.classList.add("hidden");

}
if(s.dimension2){

voidBtn.classList.remove("hidden");

voidAmount.innerText = "🌌 " + Math.floor(s.voidEnergy);

let cost = Math.floor(100 * Math.pow(2.5, s.voidBoost));

voidBoostBtn.innerText =
"🌌 Void Boost x" + (1 + s.voidBoost) +
"\nKosten: " + cost;

}


// 🔓 Unlock prüfen
checkUnlock();

// 🎨 Hintergrund
updateBackground();

}
function updateBackground(){

// 🔥 Skins haben Vorrang
if(s.skin==="fire"){
document.body.style.background="linear-gradient(#ff512f,#ff0000)";
return;
}
if(s.skin==="ice"){
document.body.style.background="linear-gradient(#00c6ff,#0072ff)";
return;
}
if(s.skin==="neon"){
document.body.style.background="linear-gradient(#6a11cb,#2575fc)";
return;
}

// 🌍 Welt abhängig
let n = worlds[s.level].name;

if(n.includes("Erde"))
document.body.style.background="linear-gradient(#2c3e50,#4ca1af)";

else if(n.includes("Mond"))
document.body.style.background="linear-gradient(#232526,#414345)";

else if(n.includes("Mars"))
document.body.style.background="linear-gradient(#ff512f,#dd2476)";

else if(n.includes("Venus"))
document.body.style.background="linear-gradient(#f7971e,#ffd200)";

else if(n.includes("Sonne"))
document.body.style.background="linear-gradient(#ff8008,#ffc837)";

else if(n.includes("Jupiter"))
document.body.style.background="linear-gradient(#c79081,#dfa579)";

else if(n.includes("Schwarzes Loch"))
document.body.style.background="black";

else
document.body.style.background="radial-gradient(circle,#1a2a6c,#000)";

}
function clickCoin(){

let boost = (1 + s.boost1 + s.prestige*0.5);

// 🧬 Dimension 1
if(s.dimension){
    boost *= 5;
}

// 🌌 Dimension 2 (EXTRA BOOST)
if(s.dimension2){
    boost *= (1 + s.voidBoost * 5);
}

s.coins += worlds[s.level].power * boost;

save();
update();
}
// WORLD
function buyWorld(){
let next = worlds[s.level+1];
if(next && s.coins >= next.cost){
s.coins -= next.cost;
s.level++;
}
save(); update();
}

// AUTO LOOP
setInterval(()=>{

let inc = (s.auto1 + s.auto2*5 + s.auto3*20);

// normale boosts
inc *= (1 + s.boost2 + s.boost3);
inc *= (1 + s.prestige*0.5);

// 🧬 Dimension 1
if(s.dimension){
    inc *= 5;
    s.darkMatter += inc * 0.001;
}

// 🌌 Dimension 2 (EXTRA BOOST)
if(s.dimension2){
    inc *= (1 + s.voidBoost * 5);
    s.voidEnergy += inc * 0.0001;
}

s.coins += inc;

save();
update();

},1000);
// BUY
function buyAuto1(){

let cost = Math.floor(50 * Math.pow(1.5, s.auto1));

if(s.coins >= cost){
    s.coins -= cost;
    s.auto1++;
    save();
    update();
}
}
function buyAuto2(){

let cost = Math.floor(200 * Math.pow(1.6, s.auto2));

if(s.coins >= cost){
    s.coins -= cost;
    s.auto2++;
    save();
    update();
}
}
function buyAuto3(){

let cost = Math.floor(1000 * Math.pow(1.7, s.auto3));

if(s.coins >= cost){
    s.coins -= cost;
    s.auto3++;
    save();
    update();
}
}
function buyBoost1(){

let cost = Math.floor(200 * Math.pow(1.8, s.boost1));

if(s.coins >= cost){
    s.coins -= cost;
    s.boost1++;
    save();
    update();
}
}
function buyBoost2(){

let cost = Math.floor(500 * Math.pow(1.9, s.boost2));

if(s.coins >= cost){
    s.coins -= cost;
    s.boost2++;
    save();
    update();
}
}
function buyBoost3(){

let cost = Math.floor(2000 * Math.pow(2.0, s.boost3));

if(s.coins >= cost){
    s.coins -= cost;
    s.boost3++;
    save();
    update();
}
}
// PRESTIGE
function prestige(){

let cost = getPrestigeCost();

if(s.coins >= cost){

    s.prestige++;

    s.coins = 0;
    s.level = 0;

    save();
    update();

}else{
    alert("❌ Zu wenig Coins!");
}
}
// SHOP
function openShop(){main.classList.add("hidden");shop.classList.remove("hidden");}
function closeShop(){shop.classList.add("hidden");main.classList.remove("hidden");}

// PRESTIGE SHOP
function openPrestigeShop(){main.classList.add("hidden");prestigeShop.classList.remove("hidden");}
function closePrestigeShop(){prestigeShop.classList.add("hidden");main.classList.remove("hidden");}

function buySkin(type){

let cost = (type==="neon") ? 10 : 5;

if(s.prestige >= cost){
s.prestige -= cost;
s.skin = type;

// 🔥 FIX (gleiches Format wie check)
localStorage.setItem("owned_" + type, "true");
}

save();
update();
}
// START
load();
update();

function checkUnlock(){

// 🧬 Dimension 1
if(s.level >= worlds.length-1 && !s.dimension){
    s.dimension = true;
    alert("🧬 Dimension freigeschaltet!");
}

// 🌌 Dimension 2 (HARTE BEDINGUNG)
if(s.dimension && s.darkMatter >= 100000 && !s.dimension2){

    s.dimension2 = true;

    alert("🌌 VOID DIMENSION FREIGESCHALTET!");

    // Reset für Balance
    s.coins = 0;
    s.level = 0;

    save();
}
}
function formatCost(num){

if(num >= 1000000){
    return (num/1000000).toFixed(1) + "M";
}
if(num >= 1000){
    return (num/1000).toFixed(1) + "K";
}

return Math.round(num);
}
function openDimensionShop(){
main.classList.add("hidden");
shop.classList.add("hidden");
prestigeShop.classList.add("hidden");
dimensionShop.classList.remove("hidden");
}

function closeDimensionShop(){
dimensionShop.classList.add("hidden");
main.classList.remove("hidden");
}
function buyVoidBoost(){

let cost = Math.floor(100 * Math.pow(2.5, s.voidBoost));

if(s.voidEnergy >= cost){
    s.voidEnergy -= cost;
    s.voidBoost++;
    save();
    update();
}
}
function openVoidShop(){
main.classList.add("hidden");
dimensionShop.classList.add("hidden");
voidShop.classList.remove("hidden");
}

function closeVoidShop(){
voidShop.classList.add("hidden");
main.classList.remove("hidden");
}
function getPrestigeCost(){
    return Math.floor(1000000 * Math.pow(2, s.prestige));
}

</script>
</body>
</html>
