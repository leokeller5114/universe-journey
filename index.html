<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe Journey</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
transition: background 1s;
background: radial-gradient(circle at 20% 20%, #4a00e0, transparent 40%),
            radial-gradient(circle at 80% 80%, #8e2de2, transparent 40%),
            black;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation: moveStars 60s linear infinite;
opacity:0.2;
}

@keyframes moveStars{
from{transform:translate(0,0);}
to{transform:translate(-500px,-500px);}
}

#card{
width:420px;
padding:25px;
border-radius:25px;
background:rgba(0,0,30,0.8);
backdrop-filter:blur(20px);
text-align:center;
box-shadow:0 0 40px rgba(138,43,226,0.5);
}

button{
width:100%;
padding:18px;
margin:8px 0;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{transform:scale(1.05);}
.hidden{display:none;}
</style>
</head>

<body>

<div id="card">

<div id="main">
<h1>🌌 Universe Journey</h1>
<p id="coins">💰 0</p>
<p id="world">🌍 Erde</p>

<button onclick="clickCoin()">✨ Energie sammeln</button>
<button onclick="buyWorld()">🚀 Nächste Welt</button>

<button onclick="openShop()">🏪 Shop</button>
<button onclick="openPrestigeShop()">💎 Prestige Shop</button>

<button id="prestigeBtn" onclick="prestige()"></button>
</div>

<div id="shop" class="hidden">
<h2>🏪 Shop</h2>

<button id="auto1Btn" onclick="buyAuto1()"></button>
<button id="auto2Btn" onclick="buyAuto2()"></button>
<button id="auto3Btn" onclick="buyAuto3()"></button>

<button id="boost1Btn" onclick="buyBoost1()"></button>
<button id="boost2Btn" onclick="buyBoost2()"></button>
<button id="boost3Btn" onclick="buyBoost3()"></button>

<button onclick="closeShop()">⬅️ Zurück</button>
</div>

<div id="prestigeShop" class="hidden">
<h2>💎 Prestige Shop</h2>

<button onclick="buySkin('fire')">🔥 Fire Skin (5💎)</button>
<button onclick="buySkin('ice')">❄️ Ice Skin (5💎)</button>
<button onclick="buySkin('neon')">💜 Neon Skin (10💎)</button>

<button onclick="closePrestigeShop()">⬅️ Zurück</button>
</div>

</div>

<script>

// 🌍 WELTEN (gekürzt nicht verändert)
const worlds = [

/* 🌍 START */
{name:"🌍 Erde",cost:0,power:1},
{name:"🌙 Mond",cost:50,power:2},
{name:"🔴 Mars",cost:200,power:4},
{name:"🟡 Venus",cost:500,power:8},
{name:"☀️ Sonne",cost:1500,power:15},
{name:"🪐 Jupiter",cost:4000,power:30},
{name:"💫 Saturn",cost:10000,power:60},
{name:"🌊 Neptun",cost:25000,power:120},

/* 🌌 GALAXIE */
{name:"🌌 Milchstraße",cost:60000,power:250},
{name:"🌠 Andromeda",cost:150000,power:500},
{name:"🌌 Triangulum",cost:300000,power:900},
{name:"🌌 Zwerggalaxie",cost:600000,power:1500},
{name:"🌌 Spiralgalaxie",cost:1200000,power:2500},
{name:"🌌 Elliptische Galaxie",cost:2500000,power:4000},

/* ⭐ STERNE */
{name:"⭐ Roter Zwerg",cost:5000000,power:7000},
{name:"⭐ Weißer Zwerg",cost:10000000,power:12000},
{name:"⭐ Neutronenstern",cost:20000000,power:20000},
{name:"🔥 Supernova",cost:40000000,power:35000},
{name:"🌀 Pulsar",cost:80000000,power:60000},

/* 🕳️ EXTREM */
{name:"🕳️ Schwarzes Loch",cost:150000000,power:100000},
{name:"🕳️ Supermassiv",cost:300000000,power:180000},
{name:"🌀 Wurmloch",cost:600000000,power:300000},
{name:"⚡ Raum-Zeit-Riss",cost:1200000000,power:500000},
{name:"🌌 Dunkle Materie",cost:2500000000,power:900000},

/* 💥 UNIVERSUM */
{name:"💥 Urknall",cost:5000000000,power:1500000},
{name:"🌌 Multiversum",cost:10000000000,power:3000000},
{name:"♾️ Unendlichkeit",cost:20000000000,power:6000000},

/* 🧬 DIMENSIONEN */
{name:"🌈 Dimensionsbruch",cost:40000000000,power:12000000},
{name:"🧬 Parallelwelt",cost:80000000000,power:25000000},
{name:"🧠 Bewusstsein",cost:150000000000,power:50000000},
{name:"👁️ Kosmisches Auge",cost:300000000000,power:100000000},
{name:"⚛️ Urenergie",cost:600000000000,power:200000000},

/* 🌀 ENDGAME */
{name:"🌌 Zeitlosigkeit",cost:1200000000000,power:400000000},
{name:"🌀 Endlosraum",cost:2500000000000,power:800000000},
{name:"💎 Realität",cost:5000000000000,power:1500000000},
{name:"🧿 Göttliche Ebene",cost:10000000000000,power:3000000000},
{name:"👑 Schöpfer",cost:20000000000000,power:6000000000},

/* 🚀 GOD TIER */
{name:"⚡ Gottmodus",cost:40000000000000,power:12000000000},
{name:"🔥 Allmacht",cost:80000000000000,power:25000000000},
{name:"🌌 Kosmischer Gott",cost:150000000000000,power:50000000000},
{name:"💠 Absolute Realität",cost:300000000000000,power:100000000000},
{name:"👑 Schöpfer aller Dinge",cost:600000000000000,power:200000000000},

/* 🧠 INSANE */
{name:"🧬 Universelles Bewusstsein",cost:1200000000000000,power:400000000000},
{name:"🌌 Realität selbst",cost:2500000000000000,power:800000000000},
{name:"⚛️ Existenzkern",cost:5000000000000000,power:1500000000000},
{name:"🌀 Ursprung der Zeit",cost:10000000000000000,power:3000000000000},
{name:"💥 Anfang & Ende",cost:20000000000000000,power:6000000000000}

];
// STATE
let s = {
coins:0,
level:0,
prestige:0,
auto1:0,
auto2:0,
auto3:0,
boost1:0,
boost2:0,
boost3:0,
skin:"default"
};

// SAVE / LOAD
function save(){
localStorage.setItem("gameSave", JSON.stringify(s));
}

function load(){
let data = localStorage.getItem("gameSave");
if(data) s = JSON.parse(data);
}

// UPDATE
function update(){

coins.innerText = "💰 "+Math.floor(s.coins)+" | 💎 "+s.prestige;
world.innerText = worlds[s.level].name;

let next = worlds[s.level+1];
document.querySelector("#main button:nth-of-type(2)").innerText =
next ? "🚀 "+next.name+" ("+next.cost+")" : "🏆 Max erreicht!";

auto1Btn.innerText = "🤖 +1/s ("+(50+s.auto1*50)+")";
auto2Btn.innerText = "🚀 +5/s ("+(200+s.auto2*200)+")";
auto3Btn.innerText = "🌌 +20/s ("+(1000+s.auto3*1000)+")";

boost1Btn.innerText =
"💥 Klick x" + (1+s.boost1) +
"\nKosten: " + (200*(s.boost1+1));

boost2Btn.innerText =
"⚡ Auto x" + (1+s.boost2) +
"\nKosten: " + (500*(s.boost2+1));

boost3Btn.innerText =
"🚀 Mega x" + (1+s.boost3) +
"\nKosten: " + (2000*(s.boost3+1));
prestigeBtn.innerText = "💎 Prestige\nKosten: 1.000.000";

updateBackground();
}

// ✅ FIXED BACKGROUND (nur einmal!)
function updateBackground(){

if(s.skin==="fire"){
document.body.style.background="linear-gradient(#ff512f,#ff0000)";
return;
}
if(s.skin==="ice"){
document.body.style.background="linear-gradient(#00c6ff,#0072ff)";
return;
}
if(s.skin==="neon"){
document.body.style.background="linear-gradient(#6a11cb,#2575fc)";
return;
}

let n = worlds[s.level].name;

if(n.includes("Erde"))
document.body.style.background="linear-gradient(#2c3e50,#4ca1af)";
else if(n.includes("Mars"))
document.body.style.background="linear-gradient(#ff512f,#dd2476)";
else if(n.includes("Sonne"))
document.body.style.background="linear-gradient(#ff8008,#ffc837)";
else
document.body.style.background="radial-gradient(circle,#1a2a6c,#000)";
}

// CLICK
function clickCoin(){
s.coins += worlds[s.level].power * (1+s.boost1+s.prestige*0.5);
save(); update();
}

// WORLD
function buyWorld(){
let next = worlds[s.level+1];
if(next && s.coins >= next.cost){
s.coins -= next.cost;
s.level++;
}
save(); update();
}

// AUTO LOOP
setInterval(()=>{
let inc = (s.auto1 + s.auto2*5 + s.auto3*20);
inc *= (1+s.boost2+s.boost3);
inc *= (1+s.prestige*0.5);
s.coins += inc;
save(); update();
},1000);

// BUY
function buyAuto1(){if(s.coins>=50){s.coins-=50;s.auto1++;save();update();}}
function buyAuto2(){if(s.coins>=200){s.coins-=200;s.auto2++;save();update();}}
function buyAuto3(){if(s.coins>=1000){s.coins-=1000;s.auto3++;save();update();}}

function buyBoost1(){if(s.coins>=200){s.coins-=200;s.boost1++;save();update();}}
function buyBoost2(){if(s.coins>=500){s.coins-=500;s.boost2++;save();update();}}
function buyBoost3(){if(s.coins>=2000){s.coins-=2000;s.boost3++;save();update();}}

// PRESTIGE
function prestige(){
if(s.coins>=1000000){
s.prestige++;
s.coins=0;
s.level=0;
}
save(); update();
}

// SHOP
function openShop(){main.classList.add("hidden");shop.classList.remove("hidden");}
function closeShop(){shop.classList.add("hidden");main.classList.remove("hidden");}

// PRESTIGE SHOP
function openPrestigeShop(){main.classList.add("hidden");prestigeShop.classList.remove("hidden");}
function closePrestigeShop(){prestigeShop.classList.add("hidden");main.classList.remove("hidden");}

function buySkin(type){
let cost = type==="neon"?10:5;
if(s.prestige>=cost){
s.prestige-=cost;
s.skin=type;
}
save(); update();
}

// START
load();
update();

</script>
</body>
</html>
